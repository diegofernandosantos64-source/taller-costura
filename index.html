<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffffff">
<title>Taller · Gestión</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg:#ffffff;--card:#f7f7f5;--card2:#efefec;--border:#d4cfc8;
    --gold:#8a6a2e;--text:#1a1814;--muted:#5a5550;--dim:#8a8580;
    --faint:#b0ada8;--alert:#c05a20;--alertbg:#fff3ec;
    --green:#2a7a2a;--greenbg:#edf7ed;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:Georgia,'Times New Roman',serif;overflow-x:hidden;}

  .header{background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;}
  .header-top{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 8px;}
  .logo{font-size:18px;font-weight:700;letter-spacing:.25em;color:var(--gold);}
  .logo-sub{font-size:10px;color:var(--dim);letter-spacing:.15em;margin-top:2px;}
  .sync-status{font-size:11px;color:var(--dim);display:flex;align-items:center;gap:6px;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--faint);}
  .sync-dot.ok{background:var(--green);}
  .sync-dot.loading{background:var(--gold);animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  .nav{display:flex;border-top:1px solid var(--border);}
  .nav-btn{flex:1;background:transparent;border:none;border-bottom:2px solid transparent;
    color:var(--dim);padding:8px 2px;cursor:pointer;font-size:10px;letter-spacing:.04em;
    font-family:Georgia,serif;display:flex;flex-direction:column;align-items:center;gap:2px;}
  .nav-btn.active{color:var(--gold);border-bottom:2px solid var(--gold);}
  .nav-icon{font-size:16px;}

  .main{padding:16px 12px 80px;}

  .card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:20px 16px;margin-bottom:12px;}
  .card-title{font-size:11px;color:var(--gold);letter-spacing:.2em;text-transform:uppercase;margin-bottom:18px;}

  .field{margin-bottom:16px;}
  .label{display:block;font-size:10px;color:var(--dim);letter-spacing:.15em;text-transform:uppercase;margin-bottom:7px;}
  select,input,textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;
    color:var(--text);padding:11px 12px;font-size:15px;font-family:Georgia,serif;outline:none;
    -webkit-appearance:none;appearance:none;}
  input[type=number]{-moz-appearance:textfield;}
  input[type=date]{color:var(--text);}
  textarea{resize:vertical;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

  .arreglos-grid{display:flex;flex-direction:column;gap:6px;}
  .arreglo-btn{background:var(--bg);border:1px solid var(--border);border-radius:4px;
    color:var(--muted);padding:11px 14px;cursor:pointer;display:flex;
    justify-content:space-between;align-items:center;font-size:13px;font-family:Georgia,serif;
    text-align:left;width:100%;}
  .arreglo-btn.sel{background:#f0ebe0;border-color:var(--gold);color:var(--text);}
  .arreglo-precio{color:var(--gold);font-size:12px;margin-left:8px;white-space:nowrap;}

  .custom-row{display:flex;gap:8px;}
  .add-btn{background:transparent;border:1px solid var(--border);border-radius:4px;
    color:var(--muted);padding:11px 14px;cursor:pointer;font-size:13px;font-family:Georgia,serif;white-space:nowrap;}

  .resumen-box{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:14px 16px;margin-bottom:16px;}
  .resumen-title{font-size:10px;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px;}
  .resumen-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--card);font-size:13px;}
  .resumen-nombre{color:var(--muted);flex:1;padding-right:8px;}
  .resumen-precio{color:var(--gold);white-space:nowrap;}
  .alerta-price{color:var(--alert);font-size:12px;font-style:italic;}
  .resumen-total{margin-top:10px;font-size:15px;color:var(--text);text-align:right;font-weight:700;}
  .remove-btn{background:transparent;border:none;color:var(--faint);cursor:pointer;font-size:16px;padding:0 6px;}

  .primary-btn{background:var(--gold);color:#fff;border:none;border-radius:4px;
    padding:15px 32px;font-size:14px;font-family:Georgia,serif;letter-spacing:.1em;
    cursor:pointer;width:100%;font-weight:700;margin-top:8px;}
  .primary-btn:disabled{background:var(--border);color:var(--faint);cursor:not-allowed;}

  /* GRUPO CARDS */
  .grupo-card{background:var(--card);border:1px solid var(--border);border-radius:6px;margin-bottom:12px;overflow:hidden;}
  .grupo-header{display:flex;justify-content:space-between;align-items:center;
    padding:12px 14px;border-bottom:1px solid var(--border);background:var(--card2);}
  .grupo-num{color:var(--gold);font-size:15px;font-weight:700;letter-spacing:.1em;margin-right:8px;}
  .grupo-tienda{color:var(--muted);font-size:12px;}
  .grupo-fecha{color:var(--faint);font-size:10px;}
  .prenda-bloque{padding:10px 14px;border-bottom:1px solid var(--card2);}
  .prenda-tipo-label{font-size:11px;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;}
  .ar-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px;border-bottom:1px solid var(--card2);}
  .ar-nombre{color:var(--muted);flex:1;}
  .ar-precio{color:var(--gold);font-size:12px;}
  .prenda-subtotal{text-align:right;font-size:12px;color:var(--text);padding-top:6px;font-weight:700;}
  .grupo-footer{display:flex;justify-content:space-between;align-items:center;
    padding:10px 14px;border-top:1px solid var(--border);background:var(--card2);gap:8px;}
  .grupo-total{font-size:14px;color:var(--text);font-weight:700;}
  .estado-select{background:var(--bg);border:1px solid var(--border);border-radius:3px;
    color:var(--text);padding:6px 10px;font-size:12px;font-family:Georgia,serif;cursor:pointer;outline:none;}
  .borrar-btn{background:transparent;border:1px solid var(--alert);border-radius:4px;
    color:var(--alert);padding:6px 10px;font-size:12px;cursor:pointer;font-family:Georgia,serif;white-space:nowrap;}

  /* CONTROL */
  .check-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--card2);}
  .check-box{width:22px;height:22px;border:2px solid var(--border);border-radius:4px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
    font-size:14px;background:var(--bg);}
  .check-box.checked{background:var(--greenbg);border-color:var(--green);color:var(--green);}
  .check-nombre{font-size:13px;color:var(--muted);flex:1;}
  .check-precio{font-size:12px;color:var(--gold);}
  .ctrl-footer{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border);}
  .ctrl-btn{flex:1;border:none;border-radius:4px;padding:10px;font-size:12px;font-family:Georgia,serif;cursor:pointer;}
  .ctrl-ok{background:var(--greenbg);color:var(--green);border:1px solid var(--green);}
  .ctrl-inc{background:var(--alertbg);color:var(--alert);border:1px solid var(--alert);}
  .ctrl-send{background:#f0f5ff;color:#4a6a9e;border:1px solid #4a6a9e;}
  .ctrl-done{background:var(--card2);color:var(--faint);border:1px solid var(--border);cursor:default;}

  /* COBROS */
  .tienda-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);}
  .tienda-nombre{font-size:14px;color:var(--gold);font-weight:700;flex:1;}
  .tienda-count{font-size:11px;color:var(--dim);}
  .tienda-total-cobros{font-size:16px;color:var(--text);font-weight:700;}
  .cont-grupo{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--card2);}
  .cont-grupo-header{font-size:12px;color:var(--gold);letter-spacing:.1em;margin-bottom:8px;display:flex;justify-content:space-between;}
  .cont-prenda-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin:8px 0 4px;}
  .cont-ar-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px;}
  .cont-ar-nombre{color:var(--muted);flex:1;}
  .cont-precio{color:var(--gold);}
  .cont-subtotal{text-align:right;font-size:12px;color:var(--text);font-weight:700;padding-top:4px;border-top:1px solid var(--card2);}
  .cont-grupo-total{text-align:right;font-size:14px;color:var(--text);font-weight:700;margin-top:8px;padding-top:8px;border-top:2px solid var(--border);}
  .tienda-total-box{background:#f0ebe0;border:1px solid var(--gold);border-radius:6px;
    padding:14px 20px;display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
  .tienda-total-label{font-size:11px;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;}
  .tienda-total-value{font-size:22px;font-weight:700;color:var(--gold);}
  .manual-row{display:flex;align-items:center;gap:6px;}
  .precio-input{width:70px;text-align:right;padding:4px 8px;font-size:13px;border-color:var(--alert);}
  .eur-label{color:var(--dim);font-size:12px;}
  .alerta-box{background:var(--alertbg);border:1px solid var(--alert);border-radius:4px;
    color:var(--alert);padding:12px 14px;font-size:13px;margin-top:12px;}
  .alerta-small{color:var(--alert);font-size:12px;}

  .empty{text-align:center;color:var(--faint);padding:50px 20px;font-size:14px;font-style:italic;}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
    background:var(--gold);color:#fff;padding:10px 24px;border-radius:20px;
    font-size:13px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
  .toast.show{opacity:1;}
  .loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:500;
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
  .spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--gold);
    border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{color:var(--dim);font-size:13px;letter-spacing:.1em;}
  select option{background:#ffffff;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="logo">TALLER</div>
      <div class="logo-sub">gestión de arreglos</div>
    </div>
    <div class="sync-status">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">Conectando…</span>
    </div>
  </div>
  <nav class="nav">
    <button class="nav-btn active" onclick="setVista('entrada')" id="nav-entrada">
      <span class="nav-icon">✦</span>Entrada
    </button>
    <button class="nav-btn" onclick="setVista('registro')" id="nav-registro">
      <span class="nav-icon">◈</span>Registro
    </button>
    <button class="nav-btn" onclick="setVista('control')" id="nav-control">
      <span class="nav-icon">◉</span>Control
    </button>
    <button class="nav-btn" onclick="setVista('contabilidad')" id="nav-contabilidad">
      <span class="nav-icon">◎</span>Cobros
    </button>
    <button class="nav-btn" onclick="setVista('tiendas')" id="nav-tiendas">
      <span class="nav-icon">◫</span>Tiendas
    </button>
  </nav>
</div>

<div class="main" id="main"></div>
<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Cargando datos…</div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby1rv4abTaQRiCV487MlDU0YtvVrX2Wo3oDpp57XNdoreRRruKT3jnn09DTnEObskRI/exec";
const SHEET_ID = "1ShNfWe2WYNDG9fm-EWeolcSpbkMEWVn29ZJhHnvXcco";

const TIPOS_BASE = ["Pantalón","Americana","Parka","Camisa","Vestido","Falda"];
let tiposCustom = [];
let arreglosCustom = [];
let tiendas = [];
let grupos = []; // array de grupos del mes actual
let checks = {}; // {grupoKey_prendaIdx_arregloIdx: true/false}

const ARREGLOS = [
  {id:"p1",tipo:"Pantalón",nombre:"Bajo",precio:4.80},
  {id:"p2",tipo:"Pantalón",nombre:"Bajo con vuelta/talonera",precio:6.30},
  {id:"p3",tipo:"Pantalón",nombre:"Cintura",precio:6.90},
  {id:"p4",tipo:"Pantalón",nombre:"Trasero",precio:6.90},
  {id:"p5",tipo:"Pantalón",nombre:"Cambiar cremallera",precio:8.40},
  {id:"p6",tipo:"Pantalón",nombre:"Estrechar pierna",precio:9.00},
  {id:"a1",tipo:"Americana",nombre:"Largo",precio:10.50},
  {id:"a2",tipo:"Americana",nombre:"Acortar mangas",precio:9.80},
  {id:"a3",tipo:"Americana",nombre:"Sacar mangas",precio:11.10},
  {id:"a4",tipo:"Americana",nombre:"Entallar costura central",precio:9.80},
  {id:"a5",tipo:"Americana",nombre:"Entallar costados",precio:9.80},
  {id:"a6",tipo:"Americana",nombre:"Entallar costados con encuentro",precio:14.00},
  {id:"a7",tipo:"Americana",nombre:"Poner hombreras",precio:8.40},
  {id:"a8",tipo:"Americana",nombre:"Bajar cuello espalda",precio:8.40},
  {id:"a9",tipo:"Americana",nombre:"Reducir hombros por hombros",precio:26.40},
  {id:"a10",tipo:"Americana",nombre:"Escotar cuellos",precio:10.50},
  {id:"a11",tipo:"Americana",nombre:"Cerrar abertura",precio:9.00},
  {id:"a12",tipo:"Americana",nombre:"Poner coderas",precio:6.90},
  {id:"a13",tipo:"Americana",nombre:"Cambiar hilo botones",precio:4.40},
  {id:"pk1",tipo:"Parka",nombre:"Costado",precio:10.50},
  {id:"pk2",tipo:"Parka",nombre:"Largo",precio:11.10},
  {id:"pk3",tipo:"Parka",nombre:"Mangas",precio:9.00},
  {id:"pk4",tipo:"Parka",nombre:"Cremallera",precio:13.20},
  {id:"c1",tipo:"Camisa",nombre:"Largo",precio:6.90},
  {id:"c2",tipo:"Camisa",nombre:"Mangas",precio:6.90},
  {id:"c3",tipo:"Camisa",nombre:"Entalle costados",precio:6.90},
  {id:"c4",tipo:"Camisa",nombre:"Entalle mangas",precio:6.90},
  {id:"c5",tipo:"Camisa",nombre:"Quitar puño doble",precio:6.90},
  {id:"v1",tipo:"Vestido",nombre:"Largo",precio:8.40},
  {id:"v2",tipo:"Vestido",nombre:"Largo con forro",precio:9.80},
  {id:"v3",tipo:"Vestido",nombre:"Entalle",precio:9.80},
  {id:"v4",tipo:"Vestido",nombre:"Hombros",precio:9.80},
  {id:"v5",tipo:"Vestido",nombre:"Mangas",precio:9.80},
  {id:"v6",tipo:"Vestido",nombre:"Cuello",precio:9.80},
  {id:"f1",tipo:"Falda",nombre:"Cintura",precio:8.40},
  {id:"f2",tipo:"Falda",nombre:"Entalle",precio:9.80},
  {id:"f3",tipo:"Falda",nombre:"Cremallera",precio:10.50},
  {id:"f4",tipo:"Falda",nombre:"Largo",precio:8.40},
  {id:"f5",tipo:"Falda",nombre:"Largo con forro",precio:9.80},
];

const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

// Form state
let formState = {
  tienda:"", numeroGrupo:"", fecha:hoyStr(),
  tipo:"", tipoCustom:"", arreglos:[], notas:""
};
let customArreglo = "";
let customPrecio = null;
let nuevaTienda = "";

// Filtros
let filtroRegistro = {tienda:"", estado:""};
let filtroControl = {tienda:"", busqueda:""};
let contMes = new Date().getMonth();
let contAno = new Date().getFullYear();
let gruposContabilidad = null;
let editPrecios = {};
let vista = "entrada";

function hoyStr() {
  const h = new Date();
  const d = String(h.getDate()).padStart(2,"0");
  const m = String(h.getMonth()+1).padStart(2,"0");
  const y = h.getFullYear();
  return `${y}-${m}-${d}`;
}

function fechaDisplay(str) {
  if (!str) return "";
  if (str.includes("/")) return str;
  const [y,m,d] = str.split("-");
  return `${d}/${m}/${y}`;
}

function fechaParaOrden(str) {
  if (!str) return 0;
  if (str.includes("/")) {
    const [d,m,y] = str.split("/");
    return parseInt(y)*10000 + parseInt(m)*100 + parseInt(d);
  }
  return parseInt(str.replace(/-/g,""));
}

function grupoKey(g) {
  return `${g.numeroGrupo}_${g.tienda}_${g.fecha}`;
}

function eur(n) {
  if (n===null||n===undefined||isNaN(n)) return "—";
  return Number(n).toFixed(2).replace(".",",")+" €";
}

// ---- API ----
function apiCall(payload) {
  setSyncLoading();
  return new Promise((resolve) => {
    const body = JSON.stringify({sheetId:SHEET_ID, ...payload});
    const xhr = new XMLHttpRequest();
    xhr.open("POST", SCRIPT_URL, true);
    xhr.setRequestHeader("Content-Type","text/plain");
    xhr.onload = function() {
      try { const d = JSON.parse(xhr.responseText); setSyncOk(); resolve(d); }
      catch(e) { setSyncOk(); resolve({success:true,data:[]}); }
    };
    xhr.onerror = function() { setSyncError(); resolve({success:false,data:[]}); };
    xhr.send(body);
  });
}

function setSyncLoading(){document.getElementById("syncDot").className="sync-dot loading";document.getElementById("syncText").textContent="Sincronizando…";}
function setSyncOk(){document.getElementById("syncDot").className="sync-dot ok";document.getElementById("syncText").textContent="Guardado en Drive";}
function setSyncError(){document.getElementById("syncDot").className="sync-dot";document.getElementById("syncText").textContent="Sin conexión";}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}
function showLoading(){document.getElementById("loadingOverlay").style.display="flex";}
function hideLoading(){document.getElementById("loadingOverlay").style.display="none";}

function setVista(v){
  vista=v;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("nav-"+v).classList.add("active");
  render();
}

// ---- CARGA INICIAL ----
async function cargarTiendas() {
  const d = await apiCall({action:"getTiendas"});
  if (d.success && Array.isArray(d.data)) tiendas = d.data.filter(t=>t&&t.trim()!=="");
}

async function cargarTiposYArreglos() {
  const [dT, dA] = await Promise.all([apiCall({action:"getTipos"}), apiCall({action:"getArreglosCustom"})]);
  if (dT.success && Array.isArray(dT.data)) tiposCustom = dT.data.filter(t=>t&&t.trim()!=="");
  if (dA.success && Array.isArray(dA.data)) arreglosCustom = dA.data;
}

function parseGrupos(rows) {
  return rows.map(r => ({
    numeroGrupo: r[0],
    tienda: r[1],
    fecha: r[2],
    prendas: JSON.parse(r[3] || "[]"),
    totalGrupo: parseFloat(r[4]) || 0,
    estado: r[5] || "Pendiente",
    notas: r[6] || ""
  })).sort((a,b) => fechaParaOrden(b.fecha) - fechaParaOrden(a.fecha));
}

async function cargarGrupos() {
  await Promise.all([cargarTiendas(), cargarTiposYArreglos()]);
  const mes = new Date().getMonth()+1;
  const ano = new Date().getFullYear();
  const d = await apiCall({action:"readMes", mes, ano});
  grupos = (d.success && d.data && d.data.length > 0) ? parseGrupos(d.data) : [];
  document.getElementById("loadingOverlay").style.display="none";
  render();
}

async function cargarContabilidad() {
  const esActual = contMes === new Date().getMonth() && contAno === new Date().getFullYear();
  if (esActual) { gruposContabilidad = null; render(); return; }
  showLoading();
  const d = await apiCall({action:"readMes", mes:contMes+1, ano:contAno});
  hideLoading();
  gruposContabilidad = (d.success && d.data && d.data.length > 0) ? parseGrupos(d.data) : [];
  render();
}

// ---- ENTRADA ----
function renderEntrada() {
  const arregloPorTipo = ARREGLOS.filter(a=>a.tipo===formState.tipo);
  const customDelTipo = arreglosCustom.filter(a=>a.tipo===formState.tipo);
  const hayArreglos = formState.arreglos.length > 0;
  const totalEstimado = formState.arreglos.reduce((s,a)=>s+(a.precio||0),0);

  return `
  <div class="card">
    <div class="card-title">Registrar Prenda</div>

    <div class="grid2">
      <div class="field">
        <label class="label">Tienda</label>
        <select onchange="formState.tienda=this.value;render()">
          <option value="">Seleccionar…</option>
          ${tiendas.map(t=>`<option value="${t}" ${formState.tienda===t?"selected":""}>${t}</option>`).join("")}
        </select>
      </div>
      <div class="field">
        <label class="label">Nº de grupo</label>
        <input type="text" placeholder="Ej: 4521" value="${formState.numeroGrupo}"
          oninput="formState.numeroGrupo=this.value">
      </div>
    </div>

    <div class="field">
      <label class="label">Fecha de entrada</label>

}

function toggleArreglo(id) {
  const ar = ARREGLOS.find(a=>a.id===id);
  const idx = formState.arreglos.findIndex(a=>a.id===id);
  if(idx>=0) formState.arreglos.splice(idx,1);
  else formState.arreglos.push({id:ar.id,nombre:ar.nombre,precio:ar.precio});
  render();
}

function toggleArregloCustomSaved(nombre, precio, tipo) {
  const idC = "cs_"+nombre;
  const idx = formState.arreglos.findIndex(a=>a.id===idC);
  if(idx>=0) formState.arreglos.splice(idx,1);
  else formState.arreglos.push({id:idC, nombre, precio});
  render();
}

function removeArreglo(i) { formState.arreglos.splice(i,1); render(); }

function addCustom() {
  if(!customArreglo.trim()) return;
  if(!formState.tipo || formState.tipo==="Otra") { alert("Selecciona primero el tipo de prenda."); return; }
  const nombre = customArreglo.trim();
  const precio = customPrecio;
  const tipo = formState.tipo;
  const idC = "cs_"+nombre;
  formState.arreglos.push({id:idC, nombre, precio});
  customArreglo=""; customPrecio=null;
  apiCall({action:"addArregloCustom", tipo, nombre, precio}).then(res=>{
    if(res.success) { arreglosCustom.push({tipo,nombre,precio}); showToast("Arreglo guardado ✓"); }
    else if(res.error&&res.error.includes("ya existe")) showToast("Arreglo ya registrado");
  });
  render();
}

async function guardarTipoCustom() {
  const nombre = formState.tipoCustom ? formState.tipoCustom.trim() : "";
  if(!nombre){ alert("Escribe el nombre del nuevo tipo."); return; }
  if(TIPOS_BASE.map(t=>t.toLowerCase()).includes(nombre.toLowerCase())||
     tiposCustom.map(t=>t.toLowerCase()).includes(nombre.toLowerCase())){
    alert("Ese tipo ya existe."); return;
  }
  showLoading();
  const res = await apiCall({action:"addTipo", nombre});
  hideLoading();
  if(res.success){ tiposCustom.push(nombre); formState.tipo=nombre; formState.tipoCustom=""; formState.arreglos=[]; showToast("Tipo guardado ✓"); render(); }
  else alert("Error: "+(res.error||"No se pudo guardar"));
}

function guardarPrenda() {
  if(!formState.tienda||!formState.numeroGrupo||!formState.tipo||formState.tipo==="Otra"||formState.arreglos.length===0) return;

  const fecha = fechaDisplay(formState.fecha);
  const nuevaPrenda = {
    tipo: formState.tipo,
    arreglos: formState.arreglos.map(a=>a.nombre),
    precios: formState.arreglos.map(a=>a.precio!==null?a.precio:null),
    notas: formState.notas
  };

  // Buscar si ya existe un grupo con ese número, tienda y fecha
  const grupoExistente = grupos.find(g =>
    String(g.numeroGrupo)===String(formState.numeroGrupo) &&
    g.tienda===formState.tienda &&
    g.fecha===fecha
  );

  if(grupoExistente) {
    // Añadir prenda al grupo existente
    grupoExistente.prendas.push(nuevaPrenda);
    grupoExistente.totalGrupo = grupoExistente.prendas.reduce((s,p)=>
      s+(p.precios||[]).reduce((s2,pr)=>s2+(pr||0),0),0);
    apiCall({action:"addPrendaAGrupo", numeroGrupo:formState.numeroGrupo, tienda:formState.tienda, fecha, prenda:nuevaPrenda});
    showToast("Prenda añadida al grupo ✓");
  } else {
    // Crear nuevo grupo
    const nuevoGrupo = {
      numeroGrupo: formState.numeroGrupo,
      tienda: formState.tienda,
      fecha,
      prendas: [nuevaPrenda],
      totalGrupo: nuevaPrenda.precios.reduce((s,p)=>s+(p||0),0),
      estado: "Pendiente",
      notas: ""
    };
    grupos.unshift(nuevoGrupo);
    apiCall({action:"appendGrupo", ...nuevoGrupo});
    showToast("Grupo creado ✓");
  }

  // Resetear solo tipo, arreglos y notas — mantener tienda, número y fecha
  formState = {...formState, tipo:"", tipoCustom:"", arreglos:[], notas:""};
  customArreglo=""; customPrecio=null;
  render();
}

  const filtrados = grupos.filter(g=>{
    if(filtroRegistro.tienda && g.tienda!==filtroRegistro.tienda) return false;

    return true;
  });

  return `

    <div class="card-title">Registro de grupos</div>
    <div class="grid2">
      <div class="field">
        <label class="label">Tienda</label>
        <select onchange="filtroRegistro.tienda=this.value;render()">
          <option value="">Todas</option>
          ${tiendas.map(t=>`<option value="${t}" ${filtroRegistro.tienda===t?"selected":""}>${t}</option>`).join("")}
        </select>
      </div>
      <div class="field">
        <label class="label">Estado</label>

function renderGrupoCard(g, modo) {
  const key = grupoKey(g);

    <div class="grupo-header">
      <div>
        <span class="grupo-num">#${g.numeroGrupo}</span>
        <span style="font-size:12px;color:var(--muted);">${g.prendas.length} prenda${g.prendas.length>1?"s":""}</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
        <span class="grupo-tienda">${g.tienda}</span>
        <span class="grupo-fecha">${g.fecha}</span>
      </div>
    </div>
    ${g.prendas.map((p,pi)=>{
      const subtotal = (p.precios||[]).reduce((s,pr)=>s+(pr||0),0);
      return `
      <div class="prenda-bloque">
        <div class="prenda-tipo-label">${p.tipo}</div>
        ${(p.arreglos||[]).map((ar,ai)=>`
          <div class="ar-row">
            <span class="ar-nombre">${ar}</span>
            ${p.precios&&p.precios[ai]!==null&&p.precios[ai]!==undefined

        `).join("")}
        ${p.notas?`<div style="font-size:11px;color:var(--dim);font-style:italic;padding-top:4px;">📝 ${p.notas}</div>`:""}

    }).join("")}
    <div class="grupo-footer">
      <div class="grupo-total">Total: ${eur(g.totalGrupo)}</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <select class="estado-select" onchange="actualizarEstado('${key}',this.value)">
          <option ${g.estado==="Pendiente"?"selected":""}>Pendiente</option>
          <option ${g.estado==="En proceso"?"selected":""}>En proceso</option>
          <option ${g.estado==="Listo"?"selected":""}>Listo</option>
          <option ${g.estado==="Entregado"?"selected":""}>Entregado</option>
        </select>
        <button class="borrar-btn" onclick="borrarGrupo('${key}')">🗑️</button>
      </div>
    </div>
  </div>`;
}

async function actualizarEstado(key, estado) {
  const g = grupos.find(x=>grupoKey(x)===key);
  if(!g) return;
  g.estado = estado;
  apiCall({action:"updateGrupo", numeroGrupo:g.numeroGrupo, tienda:g.tienda, fecha:g.fecha, estado});
  render();
}

async function borrarGrupo(key) {
  if(!confirm("¿Borrar este grupo completo?")) return;
  const g = grupos.find(x=>grupoKey(x)===key);
  if(!g) return;
  showLoading();
  const res = await apiCall({action:"deleteGrupo", numeroGrupo:g.numeroGrupo, tienda:g.tienda, fecha:g.fecha});
  hideLoading();
  if(res.success) { grupos = grupos.filter(x=>grupoKey(x)!==key); showToast("Grupo borrado ✓"); render(); }
  else alert("Error al borrar.");
}

// ---- CONTROL ----
function renderControl() {
  const filtrados = grupos.filter(g=>{
    if(g.estado==="Entregado") return false;
    if(filtroControl.tienda && g.tienda!==filtroControl.tienda) return false;
    if(filtroControl.busqueda && !String(g.numeroGrupo).includes(filtroControl.busqueda)) return false;
    return true;
  });

  return `
  <div class="card">
    <div class="card-title">Control de calidad</div>
    <div class="field">
      <label class="label">Tienda</label>
      <select onchange="filtroControl.tienda=this.value;render()">
        <option value="">Todas</option>
        ${tiendas.map(t=>`<option value="${t}" ${filtroControl.tienda===t?"selected":""}>${t}</option>`).join("")}
      </select>
    </div>
    <div class="field">
      <label class="label">Buscar por número</label>
      <input type="text" placeholder="Ej: 4521" value="${filtroControl.busqueda}"
        oninput="filtroControl.busqueda=this.value;render()">
    </div>
  </div>

  ${filtrados.length===0 ? `<div class="empty">No hay grupos pendientes de control.</div>` :
    filtrados.map(g=>{
      const key = grupoKey(g);
      const todosChecked = g.prendas.every((p,pi)=>
        (p.arreglos||[]).every((_,ai)=>checks[key+"_"+pi+"_"+ai])
      );
      return `
      <div class="grupo-card">
        <div class="grupo-header">
          <div>
            <span class="grupo-num">#${g.numeroGrupo}</span>
            <span style="font-size:12px;color:var(--muted);">${g.prendas.length} prenda${g.prendas.length>1?"s":""}</span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
            <span class="grupo-tienda">${g.tienda}</span>
            <span class="grupo-fecha">${g.fecha}</span>
          </div>
        </div>
        ${g.prendas.map((p,pi)=>`
          <div class="prenda-bloque">
            <div class="prenda-tipo-label">${p.tipo}</div>
            ${(p.arreglos||[]).map((ar,ai)=>{
              const ck = checks[key+"_"+pi+"_"+ai];
              return `
              <div class="check-row">
                <div class="check-box ${ck?"checked":""}" onclick="toggleCheck('${key}',${pi},${ai})">
                  ${ck?"✓":""}
                </div>
                <span class="check-nombre">${ar}</span>
                ${p.precios&&p.precios[ai]!==null?`<span class="check-precio">${eur(p.precios[ai])}</span>`:""}
              </div>`;
            }).join("")}
            ${p.notas?`<div style="font-size:11px;color:var(--dim);font-style:italic;padding-top:4px;">📝 ${p.notas}</div>`:""}
          </div>
        `).join("")}
        <div class="ctrl-footer">
          ${todosChecked ? `
            <button class="ctrl-btn ctrl-ok ctrl-done">✓ Todo revisado</button>
            <button class="ctrl-btn ctrl-send" onclick="marcarEnviado('${key}')">Marcar enviado</button>
          ` : `
            <button class="ctrl-btn ctrl-ok" onclick="marcarTodo('${key}',true)">✓ Marcar todo</button>
            <button class="ctrl-btn ctrl-inc" onclick="marcarTodo('${key}',false)">↺ Desmarcar todo</button>
          `}
        </div>
      </div>`;
    }).join("")
  }`;
}

function toggleCheck(key, pi, ai) {
  const ck = key+"_"+pi+"_"+ai;
  checks[ck] = !checks[ck];
  render();
}

function marcarTodo(key, valor) {
  const g = grupos.find(x=>grupoKey(x)===key);
  if(!g) return;
  g.prendas.forEach((p,pi)=>(p.arreglos||[]).forEach((_,ai)=>{ checks[key+"_"+pi+"_"+ai]=valor; }));
  render();
}

function marcarEnviado(key) {
  const g = grupos.find(x=>grupoKey(x)===key);
  if(!g) return;
  g.estado = "Entregado";
  apiCall({action:"updateGrupo", numeroGrupo:g.numeroGrupo, tienda:g.tienda, fecha:g.fecha, estado:"Entregado"});
  showToast("Marcado como enviado ✓");
  render();
}

// ---- COBROS ----
function renderContabilidad() {
  const esActual = contMes===new Date().getMonth() && contAno===new Date().getFullYear();
  const fuente = esActual ? grupos : (gruposContabilidad||[]);

  const porTienda = {};
  fuente.forEach(g=>{
    if(!porTienda[g.tienda]) porTienda[g.tienda]={grupos:[],total:0,hayPendiente:false};
    porTienda[g.tienda].grupos.push(g);
    porTienda[g.tienda].total += g.totalGrupo;
    if(g.prendas.some(p=>(p.precios||[]).some(pr=>pr===null))) porTienda[g.tienda].hayPendiente=true;
  });

  const hayPendienteGlobal = Object.values(porTienda).some(t=>t.hayPendiente);

  return `
  <div class="card">
    <div class="card-title">Contabilidad mensual</div>
    <div class="grid2">
      <div class="field">
        <label class="label">Mes</label>
        <select onchange="contMes=parseInt(this.value);cargarContabilidad()">
          ${MESES.map((m,i)=>`<option value="${i}" ${contMes===i?"selected":""}>${m}</option>`).join("")}
        </select>
      </div>
      <div class="field">
        <label class="label">Año</label>
        <select onchange="contAno=parseInt(this.value);cargarContabilidad()">
          ${[2024,2025,2026,2027].map(y=>`<option ${contAno===y?"selected":""}>${y}</option>`).join("")}
        </select>
      </div>
    </div>
    ${hayPendienteGlobal?`<div class="alerta-box">⚠ Hay arreglos sin precio. Introdúcelos manualmente abajo.</div>`:""}
  </div>

  ${Object.keys(porTienda).length===0 ? `<div class="empty">No hay datos en ${MESES[contMes]} ${contAno}.</div>` :
    Object.entries(porTienda).map(([tienda,data])=>`
    <div class="card">
      <div class="tienda-header">
        <span class="tienda-nombre">${tienda}</span>
        <span class="tienda-count">${data.grupos.length} grupo${data.grupos.length>1?"s":""}</span>
      </div>
      ${data.grupos.map(g=>`
        <div class="cont-grupo">
          <div class="cont-grupo-header">
            <span>#${g.numeroGrupo} · ${g.fecha}</span>
            <span>${g.prendas.length} prenda${g.prendas.length>1?"s":""}</span>
          </div>
          ${g.prendas.map((p,pi)=>{
            const subtotal = (p.precios||[]).reduce((s,pr)=>s+(isNaN(pr)||pr===null?0:pr),0);
            return `
            <div class="cont-prenda-label">${p.tipo}</div>
            ${(p.arreglos||[]).map((ar,ai)=>{
              const key = g.numeroGrupo+"_"+g.tienda+"_"+g.fecha+"_"+pi+"_"+ai;
              const precio = editPrecios[key]!==undefined ? parseFloat(editPrecios[key]) : (p.precios&&p.precios[ai]);
              return `<div class="cont-ar-row">
                <span class="cont-ar-nombre">${ar}</span>
                ${precio!==null&&precio!==undefined&&!isNaN(precio)
                  ? `<span class="cont-precio">${eur(precio)}</span>`
                  : `<div class="manual-row">
                      <span class="alerta-price">⚠</span>
                      <input class="precio-input" type="number" step="0.10" placeholder="0,00"
                        value="${editPrecios[key]||''}"
                        oninput="editPrecios['${key}']=this.value" onchange="render()">
                      <span class="eur-label">€</span>
                    </div>`}
              </div>`;
            }).join("")}
            <div class="cont-subtotal">Subtotal ${p.tipo}: ${eur(subtotal)}</div>`;
          }).join("")}
          <div class="cont-grupo-total">Total grupo #${g.numeroGrupo}: ${eur(g.totalGrupo)}</div>
        </div>
      `).join("")}
      <div class="tienda-total-box">
        <span class="tienda-total-label">Total ${tienda}</span>
        <span class="tienda-total-value">${eur(data.total)}</span>
      </div>
    </div>`).join("")
  }`;
}

    `).join("")}
  </div>` : ""}`;
}

async function addTienda() {
  const input = document.getElementById("nuevaTiendaInput");
  const nombre = input ? input.value.trim() : nuevaTienda.trim();
  if(!nombre){ alert("Escribe el nombre de la tienda."); return; }
  if(tiendas.map(t=>t.toLowerCase()).includes(nombre.toLowerCase())){ alert("Esa tienda ya existe."); return; }
  showLoading();
  const res = await apiCall({action:"addTienda", nombre});
  hideLoading();
  if(res.success){ tiendas.push(nombre); nuevaTienda=""; showToast("Tienda añadida ✓"); render(); }
  else alert("Error: "+(res.error||"No se pudo añadir"));
}

async function deleteTienda(nombre) {
  if(!confirm("¿Eliminar la tienda "+nombre+"?")) return;
  showLoading();
  const res = await apiCall({action:"deleteTienda", nombre});
  hideLoading();
  if(res.success){ tiendas=tiendas.filter(t=>t!==nombre); showToast("Tienda eliminada ✓"); render(); }
  else alert("Error: "+(res.error||"No se pudo eliminar"));
}

async function eliminarArregloCustom(tipo, nombre) {
  if(!confirm("¿Eliminar el arreglo "+nombre+"?")) return;
  showLoading();
  const res = await apiCall({action:"deleteArregloCustom", tipo, nombre});
  hideLoading();
  if(res.success){ arreglosCustom=arreglosCustom.filter(a=>!(a.tipo===tipo&&a.nombre===nombre)); showToast("Arreglo eliminado ✓"); render(); }
  else alert("Error: "+(res.error||"No se pudo eliminar"));
}

// ---- RENDER ----
function render() {
  const m = document.getElementById("main");
  if(vista==="entrada") m.innerHTML = renderEntrada();
  else if(vista==="registro") m.innerHTML = renderRegistro();
  else if(vista==="control") m.innerHTML = renderControl();
  else if(vista==="contabilidad") m.innerHTML = renderContabilidad();
  else if(vista==="tiendas") m.innerHTML = renderTiendas();
}

// ---- INIT ----
cargarGrupos();
</script>
